<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WeatherRouter — Nordic Route Planner</title>

        <!-- Leaflet CSS -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />

        <!-- Flatpickr CSS -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
        />

        <!-- App CSS -->
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!-- ===== Header Bar ===== -->
        <header class="header">
            <div class="header-brand">
                <span class="header-logo" aria-hidden="true">&#x1F9ED;</span>
                <h1>WeatherRouter</h1>
                <span class="subtitle">Nordic Route Planner</span>
            </div>
        </header>

        <!-- ===== Main Content ===== -->
        <main class="main">
            <!-- ---- Sidebar ---- -->
            <aside class="sidebar">
                <div class="sidebar-content">
                    <!-- Search section -->
                    <div class="search-section">
                        <h2>Plan your route</h2>

                        <!-- Start input -->
                        <div class="input-group" id="start-group">
                            <span class="input-icon start-icon"></span>
                            <input
                                type="text"
                                id="start-input"
                                placeholder="Start location"
                                autocomplete="off"
                            />
                            <div
                                class="autocomplete-dropdown"
                                id="start-dropdown"
                            ></div>
                        </div>

                        <!-- Visual connector -->
                        <div class="input-connector"></div>

                        <!-- End input -->
                        <div class="input-group" id="end-group">
                            <span class="input-icon end-icon"></span>
                            <input
                                type="text"
                                id="end-input"
                                placeholder="End location"
                                autocomplete="off"
                            />
                            <div
                                class="autocomplete-dropdown"
                                id="end-dropdown"
                            ></div>
                        </div>

                        <!-- Departure time -->
                        <div class="departure-section">
                            <label
                                class="departure-label"
                                for="departure-input"
                            >
                                <span class="departure-icon">🕐</span> Departure
                            </label>
                            <input
                                type="datetime-local"
                                id="departure-input"
                                class="departure-input"
                            />
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="button-row">
                        <button class="btn btn-primary" id="plan-btn">
                            <span id="plan-btn-text">Plan Route</span>
                        </button>
                        <button class="btn btn-secondary" id="clear-btn">
                            Clear
                        </button>
                    </div>

                    <!-- Routes section -->
                    <div class="routes-section" id="routes-section">
                        <h2>Routes</h2>
                        <div class="routes-list" id="routes-list">
                            <div class="routes-empty">
                                <div class="empty-icon">&#x1F5FA;&#xFE0F;</div>
                                <div>
                                    Set start &amp; end points to discover
                                    routes
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar footer -->
                <div class="sidebar-footer">
                    <div class="hint">
                        Click on map to set start / end points
                    </div>
                    <div class="v2-note" id="weather-attribution">
                        &#x1F326;&#xFE0F; Weather data by
                        <a
                            href="https://open-meteo.com/"
                            target="_blank"
                            rel="noopener"
                            >Open-Meteo</a
                        >
                    </div>
                </div>
            </aside>

            <!-- ---- Map ---- -->
            <div class="map-container">
                <div id="map"></div>
                <div class="map-loading-overlay" id="map-overlay">
                    <div class="map-loading-spinner"></div>
                </div>
            </div>

            <!-- Mobile-only attribution (shown below map) -->
            <div class="mobile-attribution" id="mobile-attribution">
                &#x1F326;&#xFE0F; Weather data by
                <a href="https://open-meteo.com/" target="_blank" rel="noopener"
                    >Open-Meteo</a
                >
                &middot; Click map to set points
            </div>
        </main>

        <!-- Toast container for notifications -->
        <div class="toast-container" id="toast-container"></div>

        <!-- Leaflet JS -->
        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>

        <!-- Flatpickr JS -->
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

        <!-- App JS -->
        <script src="js/app.js"></script>
    </body>
</html>
